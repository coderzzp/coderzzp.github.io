<script>
var obox=document.getElementById("box");
var oul=document.getElementsByTagName("ul");
var oimg=oul[0].getElementsByTagName("li")
var onum=oul[1].getElementsByTagName("li")
var index=0
var timer=play=null
obox.onmouseover=function(){
	clearInterval(play)
}
obox.onmouseout=function(){
	autoplay();
}
function autoplay(){
	play=setInterval(function(){
		index++;
		index>oimg.length-1&&(index=0);
		show(index);
	},2000)
}
autoplay();
function show(a){
	var index=a;
	var op=0
	for(i=0;i<onum.length;i++)onum[i].className="";
	console.log(index)
	onum[index].className="current";
	clearInterval(timer);
	for(var i=0;i<oimg.length;i++){
		oimg[i].style.opacity=0;
	}
	timer=setInterval(function(){
		op+=0.02;
		op>1&&(op=1);
		oimg[index].style.opacity=op;
		op==1&&clearInterval(timer)
	},20)
}
