<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>页面加载后，自加1</title>

</head>

<body>
1
<script>

window.onload = function ()
{
	var oBody = document.body;
	var i = 0;
	setInterval(updateNum, 1000);
	//先直接调用一次update函数
	updateNum();
	function updateNum()
	{
		oBody.innerHTML = ++i	
	}
}
</script>
</body>
</html>
