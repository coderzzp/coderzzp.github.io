<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
<style>
*{padding:0;margin:0;font-size:12px}
button{padding:3px 5px;cursor:pointer}
#win{position:absolute;top:50%;left:50%;width:400px;height:200px;background:#FFFFFF;border:5px solid #FF9900;margin-top:-103px;margin-left:-203px;display:none;}
h2{text-align:right;background:#FFCC00;border-bottom:3px solid #f90;padding:5px;}
h2 span{border:1px solid #FFFFFF;background:#FFFFFF;cursor:pointer}
#back{position:absolute;background:black;opacity:0.5;top:0;left:0;width:100%;height:100%;display:none}
</style>
</head>
<body>
<div id="back"></div>
<div id="win"">
	<h2>
    	<span id="close">×</span>
    </h2>
</div>
<center>
	<button>弹出层</button>
</center>
<script>
	var obtn=document.getElementsByTagName("button")[0]
	var owin=document.getElementById("win");
	var oback=document.getElementById("back");
	var oclose=document.getElementById("close");
	obtn.onclick= function(){
		owin.style.display="block";
		oback.style.display="block";
	}
	oclose.onclick= function(){
		owin.style.display="none";
		oback.style.display="none";
	}	
</script>
</body>

</html>
<!--主要就是position定位问题
