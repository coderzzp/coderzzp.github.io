<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>用parseInt解析数字，并求和</title>
<style>
*{padding:0;margin:0 auto;}
#outer{text-align:center}
input[type="text"]{width:50px;background:#f0f0f0;padding:3px;border:1px solid #CCCCCC}
strong{margin:0 3px}
</style>
</head>

<body>
<div id="outer">
	<input type="text" ><strong>+</strong><input type="text" > <strong>=</strong><span>?</span><input type="button" value="求和" >
</div>
<script>
window.onload=function(){
	var oinput=document.getElementsByTagName("input")
	var oans=document.getElementsByTagName("span")[0]
	//定义当输入的值不是数字时，自动修改为无内容
	for(var i=0;i<oinput.length-1;i++){
		oinput[i].onkeyup	=function(){
			this.value=this.value.replace(/[^\d]/,"")
		}
	}
	//还是三元表达式的应用
	oinput[2].onclick=function(){
			(oinput[0].value==""||oinput[1].value=="")?alert("请输入数字!"):oans.innerHTML=parseInt(oinput[0].value)+parseInt(oinput[1].value);
	}
}
</script>
</body>
</html>
