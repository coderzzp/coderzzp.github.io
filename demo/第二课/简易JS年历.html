<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>简易JS年历</title>
<style>
*{padding:0;margin:0 auto;}
#outer{width:248px;background:#eaeaea;overflow:hidden;padding:0 0 10px 10px}
ul{overflow:hidden}
strong{font-size:18px;font-weight:bold;padding:5px;}
li{list-style:none;width:40px;height:40px;padding:5px;border:1px solid #424242;margin:10px 10px 0 0 ;float:left;background:#424242;text-align:center;color:#FFFFFF}
#msg{border:1px solid #FFFFFF;color:#666666;background:#F1F1F1;margin-top:10px;margin-right:10px}
p{font-size:12px}
.current{background:#FFFFFF;color:#FF6699;}
</style>
</head>

<body>
<div id="outer">
	<ul>
    	<li class="current">
        	<strong>1</strong>
            JAN
        </li>
    	<li>
        	<strong>2</strong>
            FER
        </li>
    	<li>
        	<strong>3</strong>
            MAR
        </li>
    	<li>
        	<strong>4</strong>
            APR
        </li>
    	<li>
        	<strong>5</strong>
            MAY
        </li>
    	<li>
        	<strong>6</strong>
            JUN
        </li>
    	<li>
        	<strong>7</strong>
            JUL
        </li>
    	<li>
        	<strong>8</strong>
            AUG
        </li>
    	<li>
        	<strong>9</strong>
            SEP
        </li>
    	<li>
        	<strong>10</strong>
            OCT
        </li>
    	<li>
        	<strong>11</strong>
            NOV
        </li>
    	<li>
        	<strong>12</strong>
            DEC
        </li>
    </ul>
    <div id="msg">
    	<h2>
        	<strong>1</strong>月节日
        </h2>
        <p>元旦：1月1日至3日放假三天。</p>
    </div>
</div>
<script>
window.onload=function(){
	var oli=document.getElementById("outer").getElementsByTagName("li")
	var omsg=document.getElementById("msg")
	var ostrong=msg.getElementsByTagName("strong")[0]
	var op=document.getElementsByTagName("p")[0]
	var oarray = [
			"元旦：1月1日至3日放假三天。",
			"春节：2月2日至8日放假7天。",
			"妇女节：3月8日妇女节，与我无关。",
			"清明节：4月3日至5日放假3天",
			"劳动节：4月30日至5月2日放假3天。",
			"端午节：6月4日至6日放假3天。",
			"小暑：7月7日小暑。不放假。",
			"七夕节：8月6日七夕节。不放假。",
			"中秋节：9月10日至12日放假3天。",
			"国庆节：10月1日至7日放假7天。",
			"立冬：11月8日立冬。不放假。",
			"艾滋病日:12月1日<br />废除奴隶制国际日:12月2日。"]//定义一个数组用来修改P元素的值
	for(var i=0;i<oli.length;i++){
		oli[i].index=i;
		oli[i].onmouseover=function(){
			for(var n=0;n<oli.length;n++)oli[n].className="";
			this.className="current";
			op.innerHTML=oarray[this.index]
			ostrong.innerHTML=this.index+1;
		}	
	}
}
</script>
</body>
</html>
