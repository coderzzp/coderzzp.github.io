<!doctype html>

<title>提示框效果</title>
<style>
*{margin:0 auto;padding:0;font-size:12px;color:#333}
#outer{width:560px;border:1px solid #333;padding:0 0 10px 10px;}
#nav:after{content:".";display:block;height:0;clear:both;visibility:hidden;}
#nav li{list-style:none;width:100px;height:100px;border:1px solid #333;float:left;margin:10px 10px 0 0;background:#D8D6D6;position:relative}
strong{display:block;margin-bottom:10px;}
a{width:80px;height:80px;padding:10px;display:block;text-decoration:none;}/*任何盒子模型的属性都要基于对象是block的*/
h2{text-align:center;font-size:20px;padding:15px}
.zindex{z-index:1}
img{position:absolute;top:-14px;left:-14px;border:1px solid #333333;}
</style>
</head>

<body>
<div id="outer">

<script>
window.onload=function(){
	var oli=document.getElementsByTagName("li");
	var oa=document.getElementsByTagName("a")
	var oimg=document.getElementsByTagName("img")
	for(i=0;i<oli.length;i++){
		oli[i].index=oa[i].index=oimg[i].index=i;
		oa[i].onmouseover=function(){
			oli[this.index].className="zindex"
			oimg[this.index].style.display="block"
		}
		oimg[i].onmouseout=function(){
			oli[this.index].className=""
			oimg[this.index].style.display="none"
		}
	}
}
	
</script>
