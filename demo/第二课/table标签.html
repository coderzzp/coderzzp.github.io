<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>checkbox全选/全不选</title>
<style>
*{padding:0 ;margin:0 auto;font-size:12px;font-family:Tahoma;}
#outer{background:#FAFAFA;border:1px solid #666;width:120px;padding:10px 5px;border-radius:5px}
p{margin-top:10px}
#nav{padding-bottom:10px;border-bottom:1px solid #666}
.box input{margin-right:5px}
</style>
</head>

<body>
<div id="outer">
	<div id="nav">
    	<input type="checkbox" id="checkall">
        <strong>全选</strong>
        <a href="javascript:;">反选</a>
    </div>
    <div class="box">
    	<p>
        	<input type="checkbox">选项(一)
        </p>
        <p>
        	<input type="checkbox">选项(二)
        </p>
        <p>
        	<input type="checkbox">选项(三)
        </p>
        <p>
        	<input type="checkbox">选项(四)
        </p>
        <p>
        	<input type="checkbox">选项(五)
        </p>
        <p>
        	<input type="checkbox">选项(六)
        </p>
        <p>
        	<input type="checkbox">选项(七)
        </p>
    </div>

</div>
<center>1、切换全选/全不选文字；2、根据选中个数更新全选框状态；</center>
</body>
<script>
window.onload=function(){
	var oinput=document.getElementsByTagName("input");
	var ostrong=document.getElementsByTagName("strong")[0];
	var oa=document.getElementsByTagName("a")[0];
	//开始定义判断是否为全选/全不选
	var isallchecked=function(){
		for(var i=1,n=0;i<oinput.length;i++){
			oinput[i].checked&&n++;//这里用到了&&的短路写法，用来统计选中数量从而达到判断是否全选的效果	
		}
		oinput[0].checked=n==oinput.length-1//这里用来控制当下面为input为全选/未全选时，第一个input的状态,这里需要注意运算符的优先级
		ostrong.innerHTML=oinput[0].checked?"全不选":"全选";
	}
	//全选/全不选
	oinput[0].onclick=function(){
		for(var i=1;i<oinput.length;i++){
			oinput[i].checked=oinput[0].checked;//跟上头的选项相同
		}
		isallchecked();
	}
	//反选
	oa.onclick=function(){
		for(var i=1;i<oinput.length;i++){
			oinput[i].checked=!oinput[i].checked//跟自己之前的选项相左
		}
		isallchecked();
	}
	//这里要创建点击下面的input判断事件，
	for(var i=1;i<oinput.length;i++){
		oinput[i].onclick=function(){
			isallchecked();
		}
	}
}
</script>
</html>
