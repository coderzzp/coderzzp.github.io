<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>仿微博效果</title>
<style>
body,div,h2,h3,ul,li,p,img{margin:0;padding:0}
li{list-style-type:none}
a{text-decoration:none;}
body{color:#333333;background:#3C3A3B}
#msgBox{width:500px;background:#FFFFFF;border-radius:5px;margin:10px auto;padding-top:10px;}
form{background:url(img/boxBG.jpg) repeat-x 0 bottom;padding:0 20px 15px;}
#msgBox form h2{font-weight:400;font-size:18px}
#msgBox form div{position:relative;color:#999999;margin-top:10px;}/*这里的三个div都这样控制，高度由内容撑开*/
#userName{height:20px;}
#userName.active,#conBox.active{border:1px solid #7ABB2C}
#face{position:absolute;top:0;left:180px;}
#face img{width:28px;height:28px;opacity:0.5;}
#face img.hover,#face img.current{width:26px;height:26px;border:1px solid #f60;opacity:1}/*注意这里少了两个元素*/
#msgBox form div{position:relative;color:#999999;margin-top:10px;}
#conBox{width:448px;resize:none;height:65px;resize:none;overflow:auto;}
.tr{height:30px}
.tr p{position:absolute;left:188px;line-height:30px;height:30px}
.tr p .maxNum{font-size:20px;color:#333;}
.tr p #sendBtn{width:112px;height:30px;border:none;cursor:pointer;background:url(img/btn.png) no-repeat}
.tr p #sendBtn.hover{background-position:0 -30px}
#msgBox .list{padding:10px;}
#msgBox .list h3{position:relative;height:33px;font-size:14px;font-weight:400;background:#e3eaec;border:1px solid #DEE4E7}
#msgBox .list h3 span{position:absolute;left:6px;top:6px;background:#FFFFFF;line-height:28px;display:inline-block;padding:0 15px;}
#msgBox .list ul{overflow:hidden}
#msgBox .list ul li{float:left;clear:both;width:100%;border-bottom:1px dashed #D8D8D8;padding:10px 0;background:#fff;overflow:hidden;}
#msgBox .list ul li.hover{background:#F5F5F5}
#msgBox .list ul li .userPic{float:left;width:50px;height:50px;margin-left:10px;border:1px solid #ccc;border-radius:3px;}
#msgBox .list ul li .content{float:left;width:400px;font-size:14px;margin-left:10px;}
#msgBox .list .userName{display:inline;padding-right:5px;}
#msgBox .list .msgInfo{display:inline;}
#msgBox .list .times{color:#889db6;font:!2px;margin-top:5px;overflow:hidden}
#msgBox .list .times a{float:right;color:#889DB6;display:none;}
</style>
</head>

<body>
<div id="msgBox">
	<form>
    	<h2>来，说说你在做什么，想什么</h2>
        <div>
        	<input id="userName" class value>
            <p id="face">
            	<img src="img/face1.gif" class="current">
                <img src="img/face2.gif">
                <img src="img/face3.gif">
                <img src="img/face4.gif">
                <img src="img/face5.gif">
                <img src="img/face6.gif">
                <img src="img/face7.gif">
                <img src="img/face8.gif">
            </p>
        </div>
        <div>
        	<textarea id="conBox" class="f-text"></textarea>
        </div>
        <div class="tr">
        	<p>
            	<span class="countTxt">还能输入</span>
                <strong class="maxNum">140</strong>
                <span>个字</span>
                <input id="sendBtn" type="button" value title="快捷键Ctrl+Enter" class>
            </p>
        </div>
    </form>
    <div class="list">
    	<h3>
        	<span>大家在说</span>
        </h3>
        <ul>
        	
            <li>
            	<div class="userPic">
                	<img src="img/face.gif">
                </div>
                <div class="content">
                	<div class="userName">
                    	<a href="javascript:;">日丶久生情</a>
                        :
                    </div>
                    <div class="msgInfo">新增删除广播功能</div>
                    <div class="times">
                    	<span>07月05日15:14</span>
                        <a class="del" href="javascript:;" style="">删除</a>
                    </div>
                </div>
            </li>
            <li>
            	<div class="userPic">
                	<img src="img/face.gif">
                </div>
                <div class="content">
                	<div class="userName">
                    	<a href="javascript:;">日丶久生情</a>
                        :
                    </div>
                    <div class="msgInfo">新增选择头像功能。</div>
                    <div class="times">
                    	<span>07月05日15:14</span>
                        <a class="del" href="javascript:;" style="">删除</a>
                    </div>
                </div>
            </li>
            <li>
            	<div class="userPic">
                	<img src="img/face.gif">
                </div>
                <div class="content">
                	<div class="userName">
                    	<a href="javascript:;">日丶久生情</a>
                        :
                    </div>
                    <div class="msgInfo">新增Ctrl+Enter快捷键发送广播.</div>
                    <div class="times">
                    	<span>07月05日15:14</span>
                        <a class="del" href="javascript:;" style="">删除</a>
                    </div>
                </div>
            </li>
            <li>
            	<div class="userPic">
                	<img src="img/face.gif">
                </div>
                <div class="content">
                	<div class="userName">
                    	<a href="javascript:;">日丶久生情</a>
                        :
                    </div>
                    <div class="msgInfo">增加了记录广播时间的功能。</div>
                    <div class="times">
                    	<span>07月05日15:14</span>
                        <a class="del" href="javascript:;" style="">删除</a>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</div>
<script>
var get = {
	byId: function(id) {
		return typeof id === "string" ? document.getElementById(id) : id
	},
	byClass: function(sClass, oParent) {
		var aClass = [];
		var reClass = new RegExp("(^| )" + sClass + "( |$)");
		var aElem = this.byTagName("*", oParent);
		for (var i = 0; i < aElem.length; i++) reClass.test(aElem[i].className) && aClass.push(aElem[i]);
		return aClass
	},
	byTagName: function(elem, obj) {
		return (obj || document).getElementsByTagName(elem)
	}
};

//设置css样式，读取css样式（注意这里的case2，和case3，是为了区分要设置的属性个数，2为多个，3为单个）
function css(obj,attr,value){
	switch(arguments.length){
		case 2:
			if(typeof arguments[1]=="object"){
				for(var i in attr)i=="opacity"?(obj.style["filter"]="alpha(opacity=)"+attr[i]+")",obj.style[i]=attr[i]/100):obj.style[i]=attr[i]
			}
			else{
				return obj.currentstyle?obj.currentstyle[attr]:getComputedStyle(obj,null)[attr]	
			}
			break;
		case 3:
			attr=="opacity"?(obj.style["filter"]="alpha(opacity=)"+value+")",obj.style[attr]=value/100):obj.style[attr]=value;
			break;
	}
}
//时间绑定，删除（重点）
var EventUtil = {
	addHandler: function (oElement, sEvent, fnHandler) {
		oElement.addEventListener ? oElement.addEventListener(sEvent, fnHandler, false) : (oElement["_" + sEvent + fnHandler] = fnHandler, oElement[sEvent + fnHandler] = function () {oElement["_" + sEvent + fnHandler]()}, oElement.attachEvent("on" + sEvent, oElement[sEvent + fnHandler]))
	},
	removeHandler: function (oElement, sEvent, fnHandler) {
		oElement.removeEventListener ? oElement.removeEventListener(sEvent, fnHandler, false) : oElement.detachEvent("on" + sEvent, oElement[sEvent + fnHandler])
	},
	addLoadHandler: function (fnHandler) {
		this.addHandler(window, "load", fnHandler)
	}
};
//开始载入表单提交事件
EventUtil.addLoadHandler(function(){
	var oMsgBox = get.byId("msgBox");
	var oUserName = get.byId("userName");
	var oConBox = get.byId("conBox");
	var oSendBtn = get.byId("sendBtn");
	var oMaxNum = get.byClass("maxNum")[0];
	var oCountTxt = get.byClass("countTxt")[0];
	var oList = get.byClass("list")[0];
	var oUl = get.byTagName("ul", oList)[0];
	var aLi = get.byTagName("li", oList);
	var aFtxt = get.byClass("f-text", oMsgBox);
	var aImg = get.byTagName("img", get.byId("face"));
	var bSend = false;
	var timer = null;
	var oTmp = "";
	var i = 0;
	var maxNum = 140;
	//禁止表单提交
	EventUtil.addHandler(get.byTagName("form",oMsgBox)[0],"submit",function(){return false})
	//为按钮绑定发送事件
	EventUtil.addHandler(oSendBtn,"click",fnSend);
	//为Ctrl+Enter快捷键绑定发送事件
	EventUtil.addHandler(document,"keyup",function(){
		var event=event||window.event;
		event.ctrlKey&&event.keyCode==13&&fnSend()
	});
	//发送广播函数；
	function fnSend(){
		var reg=/^\s*$/g;
		//判断姓名是否为空
		if(reg.test(oUserName.value)){
			alert("请输入名字")
			oUserName.focus()	
		}
		//判断姓名是否为2-8位字符
		else if(!/^[u4e00-\u9fa5\w]{2,8}$/g.test(oUserName.value))
		{
			alert("\u59d3\u540d\u75312-8\u4f4d\u5b57\u6bcd\u3001\u6570\u5b57\u3001\u4e0b\u5212\u7ebf\u3001\u6c49\u5b57\u7ec4\u6210\uff01");
			oUserName.focus()
		}
		//判断微博内容是否为空
		else if(reg.test(oConBox.value))
		{
			alert("\u968f\u4fbf\u8bf4\u70b9\u4ec0\u4e48\u5427\uff01");
			oConBox.focus()
		}
		//判断发送按bsend钮是否为true，这里的bsend判断oconbox的字数有关，不为true触发
		else if(!bSend)
		{
			alert("\u4f60\u8f93\u5165\u7684\u5185\u5bb9\u5df2\u8d85\u51fa\u9650\u5236\uff0c\u8bf7\u68c0\u67e5\uff01");
			oConBox.focus()
		}
		//开始根据表单内容创建新的元素li并插入到list中
		else{
			var oLi=document.createElement("li");
			var oDate=new Date();
			oLi.innerHTML = "<div class=\"userPic\"><img src=\"" + get.byClass("current", get.byId("face"))[0].src + "\"></div>\
							 <div class=\"content\">\
							 	<div class=\"userName\"><a href=\"javascript:;\">" + oUserName.value + "</a>:</div>\
								<div class=\"msgInfo\">" + oConBox.value.replace(/<[^>]*>|&nbsp;/ig, "") + "</div>\
								<div class=\"times\"><span>" + format(oDate.getMonth() + 1) + "\u6708" + format(oDate.getDate()) + "\u65e5 " + format(oDate.getHours()) + ":" + format(oDate.getMinutes()) + "</span><a class=\"del\" href=\"javascript:;\">\u5220\u9664</a></div>\
							 </div>";
			//插入元素
			aLi.length?oUl.insertBefore(oLi,aLi[0]):oUl.appendeChild(oLi);
			//重置表单
			get.byTagName("form",oMsgBox)[0].reset();//reset用于重置表单的默认值
			for(i=0;i<aImg.length;i++){
				aImg[i].className="";
			}
			aImg[0].className="current";
			//将元素高度保存
			var iHeight=oLi.clientHeight-parseFloat(css(oLi,"paddingTop"))-parseFloat(css(oLi,"paddingBottom"));
			var count=alpha=0
			css(oLi,{"opacity":"0","height":"0"});
			timer=setInterval(function(){
				css(oLi,{"display":"block","opacity":"0","height":(count+=8)+"px"});
				//如果高度大于原本高度了，清除这个循环器,并且开始一个新的动画循环timer
				if(count>iHeight){
					clearInterval(timer);
					css(oLi,"height",iHeight+"px");
					timer=setInterval(function(){
						css(oLi,"opacity",(alpha+=10));
						alpha>100&&(clearInterval(timer),css(oLi,"opacity",100),css(oLi,"opacity",100))	
					},30)	
				}
			},30)
			//调用鼠标滑过/离开事件
			liHover();
			//调用删除函数
			delLi()
		}
	}
	//时间绑定，判断字符输入（事件监听）
	EventUtil.addHandler(oConBox,"keyup",confine);
	EventUtil.addHandler(oConBox,"focus",confine);
	EventUtil.addHandler(oConBox,"change",confine);
	//输入字符显示
	function confine(){
		var iLen=0//定义初始长度
		for(i=0;i<oConBox.value.length;i++){
			//区分全角和半角()
			iLen+=/[^\x00-\xff]/g.test(oConBox.value.charAt(i))?1:0.5;
			//var lastNum=Math.abs(maxNum-Math.floor(iLen));
			oMaxNum.innerHTML=Math.abs(maxNum-Math.floor(iLen));
			maxNum-Math.floor(iLen)>=0?bSend=true:(css(oMaxNum,"color","#f60"),oCountTxt.innerHTML="已超出",bSend=false)
		}
	}
	//加载即调用
	confine()
	//广播按钮鼠标划过样式
	EventUtil.addHandler(oSendBtn,"mouseover",function(){
		this.className="hover"	
	});
	EventUtil.addHandler(oSendBtn,"mouseout",function(){
		this.className=""	
	})
	//li鼠标滑过/离开函数
	function liHover(){
		for(i=0;i<aLi.length;i++){
			//鼠标滑过样式
			EventUtil.addHandler(aLi[i],"mouseover",function(){
				oTmp=get.byClass("times",this)[0];
				var oA=get.byTagName("a",oTmp)[0];
				this.className="hover";	
				oA.style.display="block";
			})
			EventUtil.addHandler(aLi[i],"mouseout",function(){
				oTmp=get.byClass("times",this)[0];
				var oA=get.byTagName("a",oTmp)[0];
				this.className="";
				oA.style.display="none";
			})
		}
	}
	liHover()
	//删除函数
	function delLi(){
		var aA=get.byClass("del",oUl);
		for(i=0;i<aA.length;i++){
			aA[i].onclick=function(){
				var oParent=this.parentNode.parentNode.parentNode;
				var alpha=100;
				var iHeight=oParent.offsetHeight;
				//开始减小透明度
				timer=setInterval(function(){
					css(oParent,"opacity",(alpha-=10));
					if(alpha<0){
						clearInterval(timer);
						//开始减小高度(为了实现LI缓慢消失)
						timer=setInterval(function(){
							iHeight-=10
							iHeight<0&&(iHeight=0)
							css(oParent,"height",iHeight+"px")
							iHeight==0&&(clearInterval(timer),oUl.removeChild(oParent))
						},30)	
					}
				},30)
				this.onlick=null
			}
		}
	}
	delLi();
	//输入框获取焦点时样式
	for(i=0;i<aFtxt.length;i++){
		EventUtil.addHandler(aFtxt[i],"focus",function(){
			this.className+=" active"
		})	
		EventUtil.addHandler(aFtxt[i],"blur",function(){
			this.className.replace(/\s?active/,"")
		})	
	}
	//格式化时间，如果为一位数时补0
	function format(str){
		return str.toString().replace(/^(\d)$/,"0$1")	
	}
	//头像
	for(i=0;i<aImg.length;i++){
		aImg[i].onmouseover=function(){
			this.className+=" hover"
		};
		aImg[i].onmouseout=function(){
			this.className=this.className.replace(/\s?hover/,"")
		}
		aImg[i].onclick=function(){
			for(i=0;i<aImg.length;i++)aImg[i].className="";
			this.className=" current"
		}
	}
})
<!--整体思路分析: 1.先是表单，一开始选择一个头像（有一个默认头像），然后开始依次检测表单的值，姓名不能为空且为2~8位，其次检查内容框是否为空，并且是否通过了confine函数（即检测字数，并且显示还可输入的字数多少,这个事件监听给内容框的keyup,focus,change），通过之后打开开关，当一切都ok之后，点击按钮表单才可以提交 2.表单提交后，根据提交的内同，创建一个新的表单（这里用到了转义），并且将这个表单用动画加入进list里，然后重置上面的表单3.删除按钮，为每个li增加mouseover事件，并且显示删除菜单，给删除菜单增加渐变消失动画-->
</script>
</body>
</html>
