<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
    <style type="text/css">
        div{margin: 0;padding: 0}
    </style>
</head>
<body>
    <!-- 为 ECharts 准备一个具备大小（宽高）的 DOM -->
    <div id="main" style="width: 600px;height:400px;"></div>
</body>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/echarts/3.4.0/echarts.common.js"></script>
<script type="text/javascript">
        // 基于准备好的dom，初始化echarts实例
        var myChart = echarts.init(document.getElementById('main'));

        // 指定图表的配置项和数据
            option = {
    backgroundColor: '#d7e4eb',
    title: {
        text: 'whats my credit score?',
        subtext:'% decrese on a year earlier'
    },
    color: ['#3398DB'],
    tooltip : {
        trigger: 'axis',
        axisPointer : {            // 坐标轴指示器，坐标轴触发有效
            type : 'shadow'        // 默认为直线，可选为：'line' | 'shadow'
        }
    },
    legend: {
        data:['GDP','population']
    },
    grid: {
        left: '3%',
        right: '4%',
        bottom: '3%',
        containLabel: true
    },
    xAxis : [
        {
            type : 'category',
            data : ['2006', '07', '08', '09', '10', '11', '12','13','14','15'],
            axisTick: {
                show: false,
                interval:0,
            }
        },
        {
            type : 'category',
            axisTick: {
                show: true,
                alignWithLabel: true
            },
            axisLine:{
                lineStyle:{
                    color:"#f34b47",
                    width:'3'
                }
            }
        }
    ],
    yAxis : [
        
        {   
            inverse: true,
            type : 'value',
            axisLine: {
                show: false
            },
            position:'right',
            splitLine: {
                lineStyle: {
                    color: '#fff',
                    width:'3'
                }
            },
            axisTick:{
                show:ture
            }
        }
    ],
    series : [
        {
            name:'GDP',
            type:'bar',
            barWidth: '30%',
            data:[0.1, 0.52, 2.00, 3.34, 3.90, 3.30, 2.20,0.33,4.44,0.45],
            itemStyle: {
                normal: {
                    color: '#33b6e3',
                }
            }
        },
        {
            name:'population',
            type:'bar',
            barWidth: '30%',
            barGap:0,
            data:[0.10, 0.23, 4.44, 3.34, 0.55, 0.66, 0.77,0.88,0.77,0.33],
            itemStyle: {
                normal: {
                    color: '#33748a',
                }
            }
            
        }
    ]
};
        // 使用刚指定的配置项和数据显示图表。
        myChart.setOption(option);
</script>
</html>
