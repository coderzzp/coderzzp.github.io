<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
		div{margin: 10px;}
	</style>
</head>
<body>
	<div class="wrap">
		<div >
			<input type="text" placeholder="请输入需要验证的手机号码">
			<button >验证 </button>	
		</div>
		<div >
			<input type="text" placeholder="判断输入的字符串是否有相邻重复">
			<button >验证 </button>	
		</div>
	</div>
</body>
<script type="text/javascript">
	var aBtn=document.getElementsByTagName("button")
	var aInput=document.getElementsByTagName("input")
	var aReg=[/^1[358]\d{9}$/,/\b(\w+)\b\s+\1\b/]
	for(var i=0;i<aBtn.length;i++){
		aBtn[i].index=i
		aBtn[i].onclick=function(){
			var ans=aReg[this.index].test(aInput[this.index].value)?"验证成功":"验证失败"
			alert(ans)
		}
	}
</script>
</html>
